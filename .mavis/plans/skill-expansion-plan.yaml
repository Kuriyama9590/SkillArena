version: 1
plan:
  name: 'Skill 竞技场 — 扩充 skill 库到 20+（多源汇聚）'
  max_concurrency: 4
  max_consecutive_failures: 2
  max_cycles: 6
  auto_reject_retries: 1
  verifier_config:
    default_verifiers: [verifier]
tasks:
  - id: track1-gen-by-v4pro
    title: 'v4-pro 生成 8-12 个差异化 skill'
    prompt: |
      在 E:\Projects\skill竞技场 下工作。用 deepseek-v4-pro 批量生成 10 个差异化的 skill 文件。

      ## 具体步骤
      1. 用 arena.deepseek_client.DeepSeekClient 调用 v4-pro（judge_model 已配好）
      2. 给 v4-pro 的 prompt 要明确：每个 skill 必须有具体场景/受众/风格定位；输出 100-400 字的中文 skill 内容；只输出 markdown 正文，不要解释
      3. 覆盖以下 5 类（每类 2 个）：
         - 写作：persuasive-writer（说服型）、narrative-writer（故事化）
         - 编程：code-reviewer（找 bug + 改进建议）、sql-expert（先分析再写查询）
         - 分析：chain-of-thought（显式 step-by-step）、devils-advocate（反方视角）
         - 元能力：self-critic（先答再挑刺再改）、step-back（先抽象再具体）
         - 格式约束：json-only（严格 JSON 输出）、markdown-table（强制表格）
      4. 写入 skills/gen-<slug>.md，每个文件头注释：
         ```
         # Source: generated by deepseek-v4-pro
         # Generated: 2026-06-12
         # Category: <writing|coding|analysis|meta|format>
         # Style: <一句话描述>
         ```
      5. 验证每个文件 100-400 字（用 wc -m 或 Python len）
      6. 写 deliverable-gen.md：列出 10 个文件名 + 长度 + 类别 + 一句话风格

      ## 约束
      - 不要修改现有 skills/ 下的 3 个 seed skill
      - 不联网，只调 API
      - 长度严格 100-400 字
      - 每个 skill 必须有可操作的指令（不要空泛说"写得简洁"）
    assigned_to: coder
    verified_by: verifier
    verify_prompt: |
      独立审查 E:\Projects\skill竞技场\skills\gen-*.md：
      1. 列出所有 gen-*.md 文件，确认有 10 个
      2. 用 Python 逐个读，确认文件头有 # Source: generated by deepseek-v4-pro 注释
      3. 逐个测长度（在 100-400 字之间）
      4. 抽样 3 个文件，用 cat 检查内容确实是该类别的具体指令，不是空话
      5. 检查 deliverable-gen.md：是否列出全部 10 个文件名 + 长度 + 类别
      任一不通过 FAIL，并给精确修复指引。
    timeout_ms: 1800000

  - id: track2-web-collection
    title: '从公开来源搜集 6-10 个 skill'
    prompt: |
      在 E:\Projects\skill竞技场 下工作。从公开来源搜集 8 个有代表性的 skill / system prompt。

      ## 推荐来源（按可信度排序）
      - https://github.com/f/awesome-chatgpt-prompts (README 里的 prompts)
      - https://github.com/danielmiessler/fabric 的 patterns/
      - https://docs.anthropic.com/en/prompt-library (官方 cookbook)
      - https://cookbook.openai.com/ 中的 system prompt 示例
      - https://github.com/0xeb/TheBigPromptLibrary
      - https://github.com/jonathanchaidez/awesome-prompt-engineering

      ## 具体步骤
      1. 用 webfetch / WebFetch 工具访问这些 URL，找到 8 个**真实存在的、有原文出处的** system prompt
      2. 每个 prompt 转写为 100-400 字中文版本（保留核心指令精神，不要直接复制英文版权声明）
      3. 写入 skills/collected-<slug>.md，文件头注释：
         ```
         # Source: <原始 URL>
         # Collected: 2026-06-12
         # Category: <writing|coding|analysis|meta|format>
         # Style: <一句话描述>
         # Original lang: <en|zh|...>
         ```
      4. 覆盖：写作类 3 个、编程类 2 个、分析类 2 个、元能力 1 个
      5. 写 deliverable-collected.md：列出 8 个文件名 + 来源 URL + 类别 + 一句话风格

      ## 约束
      - 每个 skill 必须能溯源到具体 URL
      - 不下载二进制文件，只读网页文本
      - 长度 100-400 字
      - 严禁复制整段版权声明/GPL 协议等无关内容
      - 如果某个 URL 不可达，立即换备用来源，不要卡住
    assigned_to: coder
    verified_by: verifier
    verify_prompt: |
      独立审查 E:\Projects\skill竞技场\skills\collected-*.md：
      1. 列出所有 collected-*.md，确认有 8 个
      2. 每个文件头必须有 # Source: <具体 URL> 注释（不能是"unknown"或空）
      3. 抽查 3 个文件的 URL，用 webfetch 验证 URL 确实能打开且确实包含相关 system prompt
      4. 长度 100-400 字
      5. 内容抽样检查：确实是 skill 指令，不是网页其他无关内容
      6. 检查 deliverable-collected.md：是否列出全部 8 个 + URL
      任一不通过 FAIL。
    timeout_ms: 1800000

  - id: track3-import-script
    title: '用户导入脚本 + 扫描现有 import_skills/'
    prompt: |
      在 E:\Projects\skill竞技场 下工作。写一个轻量扫描脚本，把用户放在 import_skills/ 下的所有 skill 自动入库到 skills/ 下。

      ## 脚本路径
      scripts/import_user_skills.py

      ## 行为
      1. 遍历 import_skills/ 下所有 .md / .txt / .yaml 文件（递归）
      2. 对每个文件：
         - 如果是 .md：直接复制到 skills/imported-<原文件名>.md
         - 如果是 .txt/.yaml：先尝试用 yaml.safe_load（如果是 yaml）或直接当纯文本，包成 markdown 写到 skills/imported-<原文件名>.md
         - 在文件最前面插入注释：
           ```
           # Source: imported from import_skills/<原文件名>
           # Imported: 2026-06-12
           # Bytes: <原始字节数>
           # SHA256: <前 12 位哈希，用于去重>
           ```
         - 写入 skills/imported-<原文件名>.md
      3. 幂等：如果 skills/imported-<原文件名>.md 已存在且 SHA256 一致，跳过；不一致则覆盖（带 warning）
      4. 重复跑不报错
      5. 空目录 import_skills/ 也能跑（输出"无待导入文件"）
      6. 打印统计：扫描到 N 个文件，成功导入 M 个，跳过 K 个（已存在且一致）

      ## 脚本质量要求
      - 类型注解完整
      - 用 argparse 接受 --import-dir（默认 import_skills/）和 --output-dir（默认 skills/）
      - 用 Path，不写死路径
      - exit code: 0 成功，1 入库过程中出错

      ## 验证
      - 即使当前 import_skills/ 是空的，也要保证脚本能跑通
      - 自测：手动在 import_skills/ 放一个测试文件，跑脚本，确认 skills/imported-test-xxx.md 被创建
      - 测完后删除测试文件 + 生成的 imported- 文件，保持仓库干净

      ## 交付
      - scripts/import_user_skills.py
      - deliverable-import-script.md：列出脚本功能 + 自测过程 + 当前 import_skills/ 状态（空/有 X 个文件）
    assigned_to: coder
    verified_by: verifier
    verify_prompt: |
      独立审查 E:\Projects\skill竞技场\scripts\import_user_skills.py：
      1. 运行 python scripts/import_user_skills.py --help，确认 argparse 工作
      2. 当前 import_skills/ 为空：跑脚本应正常退出，输出"无待导入文件"
      3. 放一个测试文件到 import_skills/test-sample.md（含已知内容），跑脚本
      4. 确认 skills/imported-test-sample.md 被创建，文件头有 # Source: imported from import_skills/test-sample.md 注释
      5. 再跑一次，确认幂等（输出"已存在且一致，跳过"）
      6. 清理测试文件和生成的 imported- 文件
      7. 跑 pytest tests/ -v 确认无回归
      任一不通过 FAIL。
    timeout_ms: 1800000

  - id: track4-integration
    title: '集成验证 + 总览报告'
    prompt: |
      在 E:\Projects\skill竞技场 下工作。整合前三个 track 的产出，跑一次端到端验证。

      ## 步骤
      1. 跑 python scripts/import_user_skills.py（扫描当前 import_skills/ 状态）
      2. 列出所有 skills/ 下的 .md 文件，确认总数 >= 20 个
      3. 用 Python 写一个 quick 校验脚本：
         - 每个 skill 文件头必须有 # Source: ... 注释
         - 长度 100-400 字
         - 包含至少一个指令关键词（"写"/"分析"/"生成"/"review"/"think"/"step"/"output"等中英文指令动词之一）
         - 不包含 API key 字符串（"sk-" 开头 + 32+ 字符）
      4. 把所有不通过的文件列出，给精确位置 + 原因
      5. 跑 pytest tests/ -v 确保没有回归（不应有任何 skill 文件改动影响测试）
      6. 写 deliverable-skill-expansion.md：
         - 总览表：每个 skill 文件名 + 来源类型（generated/collected/imported/seed）+ 类别 + 长度 + 一句话风格
         - 分类统计：每类多少个
         - 来源统计：每种来源多少个
         - 校验结果（多少通过、多少失败 + 失败原因）
         - 下一步建议（跑一次真 Elo 排名看看新 skill 表现）

      ## 交付
      - deliverable-skill-expansion.md
    assigned_to: coder
    depends_on: [track1-gen-by-v4pro, track2-web-collection, track3-import-script]
    verified_by: verifier
    verify_prompt: |
      独立审查：
      1. Get-ChildItem E:\Projects\skill竞技场\skills\ -Filter "*.md" 列出所有 skill，确认 >= 20 个
      2. 检查每个文件头有 # Source: 注释
      3. 抽样 5 个文件确认内容是该类别的具体指令
      4. 跑 pytest tests/ -v 在工作目录，确认全部通过
      5. 检查 deliverable-skill-expansion.md：是否包含总览表 + 分类统计 + 校验结果
      任一不通过 FAIL。
    timeout_ms: 1800000