- id: longtext-001
  category: longtext
  prompt: |
    阅读以下会议纪要,回答两个问题:(1) 工程师小陈负责哪几个模块?(2) 本周阻塞项里谁依赖谁的交付?只用原文信息,找不到就说"文中未提及"。

    【纪要】
    时间:6月12日 14:00。出席:老王(后端组长)、小陈(后端)、小李(前端)、阿芳(QA)。
    老王:这周排期紧,先把责任分一下。小陈,你继续负责订单服务和支付网关这两个模块的重构,上周库存模块已经交给小赵了。
    小陈:订单服务我周三能出联调接口,支付网关那边要等风控组给新的签名规范,我阻塞在他们身上。
    小李:前端购物车页面的接口契约我需要小陈的订单服务先定下来,不然我没法 mock。
    老王:那小李也阻塞在小陈身上。阿芳,你这边呢?
    阿芳:回归用例我已经写好了,但支付网关的测试环境还没好,我也卡着。
    老王:汇总一下——小陈卡风控组,小李卡小陈,阿芳卡支付网关环境。我去推风控组。
  reference: null
  difficulty: medium

- id: longtext-002
  category: longtext
  prompt: |
    以下是某产品的三段用户评价,请压缩成不超过 80 字的摘要,保留:好评点、差评点、提到的具体功能名。不得加入原文没有的评价。

    【评价一】用了一个月,降噪效果确实强,地铁里基本听不见报站,这点我很满意。但耳廓那块有点夹,戴超过一小时会疼。
    【评价二】续航很顶,我通勤加午休听歌,三天才充一次。降噪和评价一说的一样好。缺点是触控太灵敏,整理头发时总误切歌。
    【评价三】音质在这个价位算不错了,低频有劲。连接速度也快。就是降噪开久了有点闷,耳朵有压迫感,跟评价一的夹耳不一样,这个是气压问题。
  reference: null
  difficulty: hard

- id: longtext-003
  category: longtext
  prompt: |
    下面是一份采购清单的纯文本,请输出一个 Markdown 表格,列:品名、数量、单价、小计。只填表中能从原文确定的信息,不确定的单元格用"—"。表格之外不要任何文字。

    螺丝 M4×10 共200颗每颗0.12元;垫片4mm 100个单价0.05元;铜导线 1卷 80块;绝缘胶带3卷,每卷6.5;有个万用表但没写价;尼龙扎带两包,一包50根另一包数量看不清,单包9元。
  reference: null
  difficulty: medium
