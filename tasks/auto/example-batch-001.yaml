- id: coding-auto-d4e5f6
  category: coding
  prompt: "用 Python 写一个函数 group_by(items, key_fn),对 items 按 key_fn(item) 的返回值分组,返回 dict;要求 key_fn 抛异常时整组失败而不是部分成功"
  reference: |
    from collections import defaultdict
    def group_by(items, key_fn):
        out = defaultdict(list)
        for it in items:
            out[key_fn(it)].append(it)
        return dict(out)
  difficulty: medium

